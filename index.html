<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEMI - Inicio</title>
    <style>
        :root { --azul-hemi: #003366; --dorado: #d4af37; --blanco: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--azul-hemi); margin: 0; display: flex; flex-direction: column; min-height: 100vh; align-items: center; color: white; }
        header { padding: 40px 20px; text-align: center; }
        .logo { font-size: 50px; font-weight: bold; letter-spacing: 5px; margin: 0; }
        .menu { background: white; width: 100%; max-width: 500px; border-radius: 30px 30px 0 0; padding: 30px 20px; flex-grow: 1; display: flex; flex-direction: column; gap: 15px; box-sizing: border-box; }
        .btn { display: flex; align-items: center; padding: 20px; background: #f0f4f8; border-radius: 15px; text-decoration: none; color: var(--azul-hemi); font-weight: bold; border: 1px solid #ddd; cursor: pointer; width: 100%; box-sizing: border-box; }
        .icon { font-size: 25px; margin-right: 15px; background: var(--azul-hemi); color: white; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
    </style>
</head>
<body>
    <header>
        <h1 class="logo">HEMI</h1>
        <p style="color: var(--dorado); letter-spacing: 2px;">ALMACÉN DE MAQUINARIA</p>
    </header>
    <div class="menu">
        <div style="color: #333; margin-bottom: 5px;"><strong>➕ Crear Perfil Nuevo</strong></div>
        <input type="text" id="nombreInput" placeholder="Escribe el nombre aquí...">
        
        <button onclick="guardarYIr()" class="btn" style="border: none; font-size: 16px; text-align: left;">
            <span class="icon">👷</span>
            <div>
                Crear y Ver Perfil
                <br><small style="font-weight:normal; color:#666;">Registra y va al escáner</small>
            </div>
        </button>

        <a href="#" class="btn">
            <span class="icon">📦</span>
            Inventario General
        </a>
    </div>

    <script>
        function guardarYIr() {
            const nombre = document.getElementById('nombreInput').value;
            if (nombre.trim() === "") {
                alert("Por favor, escribe un nombre antes de continuar.");
                return;
            }
            // Guardamos el nombre en la memoria del celular
            localStorage.setItem('operadorActual', nombre);
            // Vamos a la página del escáner
            window.location.href = "perfiles.html";
        }
    </script>
</body>
</html>
