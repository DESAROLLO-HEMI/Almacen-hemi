<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEMI - Inicio</title>
    <style>
        :root { --azul-hemi: #003366; --dorado: #d4af37; --blanco: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--azul-hemi); margin: 0; display: flex; flex-direction: column; min-height: 100vh; align-items: center; color: white; }
        header { padding: 40px 20px; text-align: center; }
        .logo { font-size: 50px; font-weight: bold; letter-spacing: 5px; margin: 0; }
        .menu { background: white; width: 100%; max-width: 500px; border-radius: 30px 30px 0 0; padding: 30px 20px; flex-grow: 1; display: flex; flex-direction: column; gap: 15px; }
        .btn { display: flex; align-items: center; padding: 20px; background: #f0f4f8; border-radius: 15px; text-decoration: none; color: var(--azul-hemi); font-weight: bold; border: 1px solid #ddd; }
        .icon { font-size: 25px; margin-right: 15px; background: var(--azul-hemi); color: white; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
    </style>
</head>
<body>
    <header>
        <h1 class="logo">HEMI</h1>
        <p style="color: var(--dorado); letter-spacing: 2px;">ALMACÉN DE MAQUINARIA</p>
    </header>
    <div class="menu">
        <div style="color: #333; margin-bottom: 10px;"><strong>➕ Crear Perfil</strong></div>
        <input type="text" placeholder="Nombre del trabajador" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        
        <a href="perfiles.html" class="btn">
            <span class="icon">👷</span>
            Ver Perfiles / Escanear QR
        </a>
        <a href="#" class="btn">
            <span class="icon">📦</span>
            Inventario General
        </a>
    </div>
</body>
</html>
