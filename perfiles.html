<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEMI - Escáner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #003366; color: white; text-align: center; }
        .container { background: white; color: #333; margin-top: 20px; border-radius: 30px 30px 0 0; padding: 20px; min-height: 90vh; }
        .btn-scan { background: #003366; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-size: 18px; cursor: pointer; margin: 20px 0; }
        #reader { width: 100%; max-width: 400px; margin: auto; border: 2px solid #ddd; border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>
    <h2>HEMI - Operadores</h2>
    <div class="container">
        <h3>Perfil: Alfredo N.</h3>
        <p>Apunta al QR de la herramienta</p>
        
        <button class="btn-scan" onclick="iniciarEscaneo()">📸 ABRIR ESCÁNER</button>
        
        <div id="reader"></div>

        <button onclick="window.history.back()" style="margin-top:40px; background:none; border:none; color:#999;">← Volver</button>
    </div>

    <script>
        function iniciarEscaneo() {
            const html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start({ facingMode: "environment" }, config, (texto) => {
                alert("HERRAMIENTA DETECTADA: " + texto);
                html5QrCode.stop();
            }).catch(err => alert("Error: Necesitas HTTPS para usar la cámara"));
        }
    </script>
</body>
</html>
